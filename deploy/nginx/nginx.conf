# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Nginx — Production reverse proxy config
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Serves:
#   /          → Next.js UI      (cv-frontend:3000)
#   /api/      → FastAPI REST    (cv-api:8000)
#   /docs      → FastAPI Swagger UI
#   /flower    → Celery Flower   (cv-flower:5555)
#
# To enable HTTPS:
#   1. Place cert.pem + key.pem in deploy/nginx/ssl/
#   2. Uncomment the HTTPS server block below
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

worker_processes auto;

events {
    worker_connections 1024;
    multi_accept        on;
    use                 epoll;
}

http {
    # ── MIME types & basics ───────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    server_tokens off;   # hide Nginx version

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Compression ───────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # ── Connection timeouts ───────────────────────────────────
    keepalive_timeout       65;
    client_max_body_size    500M;   # Large dataset uploads
    proxy_read_timeout      3600s;  # Long training job streams
    proxy_connect_timeout   30s;
    proxy_send_timeout      3600s;

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/m;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

    # ── Upstream backends ─────────────────────────────────────
    upstream frontend_backend {
        server cv-frontend:3000;
        keepalive 16;
    }

    upstream api_backend {
        server cv-api:8000;
        keepalive 16;
    }

    upstream flower_backend {
        server cv-flower:5555;
    }

    # Retry once on upstream error (handles brief restarts)
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 5s;

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # HTTP — redirects to HTTPS in production
    # (or serves directly for local/dev)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    server {
        listen 80;
        server_name _;

        # Uncomment in production to force HTTPS:
        # return 301 https://$host$request_uri;

        # ── Health / readiness (no rate-limit) ─────────
        location ~ ^/(health|ready)$ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── API endpoints ──────────────────────
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── FastAPI docs (protected in production) ──
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Celery Flower (internal only) ───────────
        location /flower/ {
            rewrite ^/flower/(.*)$ /$1 break;
            proxy_pass         http://flower_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            # Restrict to internal/VPN in production
            # allow 10.0.0.0/8;
            # deny  all;
        }

        # ── Next.js frontend ────────────────────────────────────
        location /_next/static/ {
            proxy_pass         http://frontend_backend;
            proxy_cache_valid  200 1d;
            add_header         Cache-Control "public, max-age=86400, immutable";
        }

        location / {
            proxy_pass         http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # HTTPS — uncomment and configure for TLS
    # Place cert.pem + key.pem in deploy/nginx/ssl/
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS (1 year)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Content-Type-Options    nosniff always;
    #     add_header X-Frame-Options           SAMEORIGIN always;
    #     add_header Referrer-Policy           strict-origin-when-cross-origin always;
    #
    #     # --- same location blocks as above ---
    # }
}
