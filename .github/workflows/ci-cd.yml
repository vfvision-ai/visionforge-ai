name: CI / CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:     ["v*.*.*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  ECR_REPO:    visionforge
  IMAGE_NAME:  visionforge

jobs:
  # -- Tests ----------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # CPU-only torch for CI speed
          pip install torch==2.5.1+cpu torchvision==0.20.1+cpu \
            --extra-index-url https://download.pytorch.org/whl/cpu
          pip install tensorflow-cpu==2.15.0
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install black==23.7.0 flake8==6.0.0
          black --check .
          flake8 . --max-line-length=120 --exclude=app_legacy.py

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # -- Security scan --------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref:  "."
          format:    sarif
          output:    trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        if: always()
        continue-on-error: true

  # -- Build & push Docker image to ECR -------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write   # for OIDC auth with AWS
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION || 'us-east-1' }}
        continue-on-error: true  # skip push if no AWS creds in forks

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        continue-on-error: true

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push:    ${{ steps.ecr-login.outcome == 'success' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # -- Deploy to Staging -----------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url:  ${{ secrets.STAGING_URL }}
    concurrency:
      group: staging-deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/ml-platform
            export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            export ECR_REPO=${{ env.ECR_REPO }}
            export DEPLOY_TAG=${{ needs.build.outputs.image-tag }}
            ./deploy/aws/deploy.sh
        continue-on-error: true   # Don't fail if staging not configured

  # -- Deploy to Production --------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    environment:
      name: production
      url:  ${{ secrets.PRODUCTION_URL }}
    concurrency:
      group: production-deploy
      cancel-in-progress: false   # Never cancel a production deploy mid-flight

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key:      ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/ml-platform
            export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            export ECR_REPO=${{ env.ECR_REPO }}
            export DEPLOY_TAG=${{ needs.build.outputs.image-tag }}
            ./deploy/aws/deploy.sh
        continue-on-error: true   # Don't fail if production not configured
